name: Generate Daily Domestic Market Summary

on:
  schedule:
    # GitHub Actions cron uses UTC. 01:00 UTC is 10:00 KST.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-domestic-market-summary
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate KOSPI/KOSDAQ summary report
        run: python scripts/generate_market_summary.py

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/

          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Generate daily domestic market summary"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          cp index.html 404.html robots.txt site.webmanifest styles.css script.js .nojekyll _site/
          cp -R assets _site/assets
          cp -R reports _site/reports

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
